# 农保云平台

## 一、为什么要做

### 政策驱动
- 精准投保理赔成为监管要求
- 科技赋能农业保险成为明确方向
- 数据共享与监管合规要求持续加强

### 行业痛点
#### 承保端
- 保单多精确到村级，缺乏地块级核验能力
- 虚报面积、重复承保、套取补贴风险高
- 依赖人工协保，效率低、成本高、道德风险大

#### 风险减量端
- 承保期间缺乏持续监测和预警手段
- 病虫害、自然灾害风险难以及时感知
- 过程不留痕，难以提前干预骗保风险

#### 理赔端
- 定损容易受地方口径影响
- 缺少客观证据链，骗赔识别难
- 理赔周期长，农户体验差

### 市场机会
- 农业保险市场规模大，政策性资金占比高
- 保险公司招投标越来越依赖科技能力证明
- 第三方科技服务商具备明确切入空间

---

## 二、我们是什么

### 一句话定位
- 面向保险公司的农业保险精准承保、风险减量与精准理赔一体化科技服务平台

### 产品本质
- 不是纯软件系统
- 而是“科技平台 + 服务组织”的组合产品
- 平台交付与服务交付并行

### 核心目标
- 帮助保险公司提升承保真实性
- 帮助保险公司形成风险管理能力
- 帮助保险公司提升理赔客观性与效率
- 帮助平台方沉淀数据资产与服务壁垒

---

## 三、核心业务主线

### 精准承保
- 保单与地图关联
- 风险区划识别重点区域
- 卫星初筛
- 无人机复核
- 人工核验
- 输出核保结论与异常标注

### 风险减量
- 自然灾害预警
- 病虫害监测
- 过程展示监测
- 道德风险预警
- 形成承保期内持续服务记录

### 精准理赔
- 灾后快速发起核查任务
- 遥感定损
- 无人机核查
- 现场取证
- 输出定损报告与证据链

### 闭环沉淀
- 核保证据沉淀
- 过程监测沉淀
- 理赔证据沉淀
- 区域数据资产持续积累

---

## 四、我们怎么做

### 地图化底座
- 保单数据与行政区划关联
- 在地图上承载承保、监测、理赔全过程
- 形成农险业务全景视图

### 天空地一体
#### 天
- 卫星遥感
- 大范围覆盖
- 成本低，适合初筛和监测

#### 空
- 无人机平台
- 重点区域精细核查
- 适合复核和定损

#### 地
- 灾害信息员 / 外勤网络
- 现场取证与复杂核验
- 形成最终可信闭环

### 任务组织能力
- 任务创建
- 任务分派
- 任务执行跟踪
- 结果审核回收

### 证据链能力
- 影像留存
- GPS 定位留痕
- 任务日志记录
- 结果归档可追溯

---

## 五、平台能提供什么

### 对保险公司
- 提升承保真实性
- 降低骗保骗赔风险
- 提高核保和理赔效率
- 增强招投标竞争力

### 对政府监管
- 提升财政补贴真实性
- 支撑精准监管与合规落地
- 增强业务透明度

### 对农户
- 提升理赔公平性
- 缩短理赔周期
- 改善真实受灾农户体验

### 对平台方
- 沉淀区域地块与影像数据
- 构建服务能力壁垒
- 构建长期商业闭环

---

## 六、我们凭什么做

### 资源基础
- 国家减灾中心合作资源
- 卫星遥感能力
- 无人机平台能力
- 灾害信息员地面网络

### 能力差异化
- 不只是单点算法
- 不只是单次外包核查
- 而是“平台 + 调度 + 执行 + 证据”的完整闭环

### 长期壁垒
- 服务一单，沉淀一片区域数据
- 客户越多，数据越厚
- 数据越厚，复制和切换成本越高

---

## 七、当前落地重点

### 首单窗口
- 太保新疆招投标与试点项目

### 一期重点表达
- 保单地图化
- 风险区划展示
- 精准核保闭环
- 现场核查上报
- 基础报告输出

### 后续扩展方向
- 风险减量深化
- 精准理赔增强
- 数据资产运营
- 全国复制与规模化推广

### 汇报口径提醒
- 合作边界以正式协议为准
- 技术能力优先表述为“分级交付能力”
- 不提前承诺未验证的独家性与全量调度能力

<script>
  (function () {
    function resizeForPrint() {
      const container = document.getElementById('mind-map-container');
      const svg = document.querySelector('svg.markmap');
      if (!container || !svg) return false;
      const box = svg.getBBox();
      const padding = 80;
      const width = Math.ceil(box.x + box.width + padding * 2);
      const height = Math.ceil(box.y + box.height + padding * 2);
      container.style.width = width + 'px';
      container.style.height = height + 'px';
      svg.style.width = width + 'px';
      svg.style.height = height + 'px';
      svg.setAttribute('viewBox', [box.x - padding, box.y - padding, width, height].join(' '));
      svg.setAttribute('width', width);
      svg.setAttribute('height', height);
      document.body.style.width = width + 'px';
      document.body.style.minHeight = 'auto';
      return true;
    }

    let attempts = 0;
    const timer = setInterval(function () {
      attempts += 1;
      if (resizeForPrint() || attempts > 40) {
        clearInterval(timer);
      }
    }, 500);

    window.addEventListener('beforeprint', resizeForPrint);
  })();
</script>
