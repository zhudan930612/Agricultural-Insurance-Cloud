# 农保云平台

## 一、用户角色

### 保险公司侧
#### 农险业务负责人
- 所属：保险公司总部/省级分公司
- 职责：采购平台服务、审核核保结果、查看风险地图、评估理赔证据
- 关注：数据可信度 · 结果准确性 · 服务成本
- 使用端：**PC 管理端**

#### 外勤 / 协保人员
- 所属：保险公司业务条线
- 职责：接收核查任务、现场拍照上报
- 关注：任务明确 · 操作简便
- 使用端：**移动端 App**

### 平台方（我司）侧
#### 平台运营管理员
- 职责：任务分发、数据质量管理、异常处理
- 关注：任务执行率 · 数据质量
- 使用端：**PC 管理端**

#### 平台管理员
- 职责：保险公司账号开通、权限配置、系统配置
- 关注：数据安全 · 权限隔离
- 使用端：**PC 管理端**

#### 数据分析员
- 职责：风险区划分析、报告输出
- 关注：分析准确性 · 报告可读性
- 使用端：**PC 管理端**

### 地面执行方
#### 灾害信息员（国家减灾中心）
- 数量：约 120 万人，覆盖全国到村级
- 职责：现场核保 · 灾情记录 · 信息上报
- 关注：任务指令清晰 · 操作简便
- 使用端：**移动端 App**

---

## 二、功能框架

### 基础地图平台（底座）
#### 行政区划地图
- 到村级行政区划 GIS 数据
- 省市县乡村层级联动展示

#### 保单与地图关联
- 保险公司保单数据导入
- 保单精确到村级行政区划
- 投保分布热力可视化

#### 遥感影像叠加
- 卫星遥感底图接入
- 耕地 / 水田区域识别
- 时序影像对比查看

### 精准核保服务
#### 任务管理
- 核保任务创建 & 分发
- 任务状态追踪
- 核保结果审核入库
- 异常标注 & 推送

#### 卫星遥感核保
- 大范围地块识别
- 面积自动估算
- 成本低 · 精度有限

#### 无人机核保
- 重点区域低空精拍
- 精度高 · 按需调度
- 影像回传 & 存档

#### 人工核保（灾害信息员）
- GPS 打点 + 现场拍照
- 精度最高 · 适合复杂核查
- 与无人机协同作业

### 风险区划地图
#### 风险数据管理
- 历史灾害数据入库
- 气象历史数据接入

#### 风险等级分析
- 区域风险等级计算（高 / 中 / 低）
- 差异化费率支撑

#### 地图可视化
- 风险区划专题地图
- 风险报告导出

### 风险减量服务
#### 自然灾害预警
- 对接气象数据平台
- 承保区域灾害预警推送
- 干旱 · 洪涝 · 冰雹等

#### 病虫害监测
- 卫星 / 无人机遥感分析
- 图像识别模型识别病虫害
- 区域病虫害预警推送

#### 过程展示监测
- 关键生长节点影像留存
- 时序记录形成生长档案
- 为理赔提供过程证据

#### 道德风险预警
- 异常种植行为识别
- 承保面积与实际种植对比
- 主动预警 · 提前干预

### 精准理赔辅助
#### 理赔核查任务
- 灾后快速发起核查任务
- 任务分级：卫星 / 无人机 / 现场

#### 遥感定损
- 大范围受灾影像获取
- 受灾面积快速估算

#### 无人机核查
- 重点区域精细定损
- 影像证据留存

#### 现场核验
- 灾害信息员到场核实
- GPS 定位 + 照片上报
- 最终定损报告生成

#### 理赔辅助输出
- 受灾范围地图
- 生长过程对比影像
- 核查结论报告

### 协保人员管理
#### 人员档案
- 人员基本信息 & 所在区域
- 人员绩效记录

#### 任务分发
- 按区域 / 任务类型分派
- 任务状态实时追踪

#### 现场数据上报
- 移动端 App 任务接收
- GPS 定位 · 拍照 · 提交

#### 质量管控
- 数据完整性校验
- 服务质量评分

### 数据分析与报告
#### 核保统计
- 核保覆盖面积 & 准确率
- 异常发现率（面积差异率）

#### 受灾分析
- 受灾范围 & 分布图
- 受灾面积趋势

#### 风险减量效果
- 预警响应时效报告
- 风险减量服务记录归档

#### 数据资产管理
- 地块台账数据沉淀
- 历史核保数据

## 三、系统架构（天空地）

### L1 用户交互层
- PC Web 管理端（保险公司 & 我司）
- 移动端 App（外勤 & 灾害信息员）

### L2 应用服务层
- 精准核保 · 风险区划 · 风险减量
- 精准理赔 · 协保管理 · 数据分析

### L3 业务支撑层
- 任务调度引擎
- GIS 地图服务
- 遥感影像处理
- 预警推送服务

### L4 数据支撑层
- 保单库 · 地块库
- 遥感影像时序库
- 灾害历史库 · 气象预警库

### L5 基础设施层（天空地）
#### 天（卫星）
- 国家减灾中心卫星遥感
- 大范围覆盖 · 成本低

#### 空（无人机）
- 国家减灾中心 300+ 架
- 高精度 · 按需调度

#### 地（信息员）
- 约 120 万灾害信息员
- 全国到村级全覆盖

<script>
  (function () {
    function resizeForPrint() {
      const container = document.getElementById('mind-map-container');
      const svg = document.querySelector('svg.markmap');
      if (!container || !svg) return false;
      const box = svg.getBBox();
      const padding = 80;
      const width = Math.ceil(box.x + box.width + padding * 2);
      const height = Math.ceil(box.y + box.height + padding * 2);
      container.style.width = width + 'px';
      container.style.height = height + 'px';
      svg.style.width = width + 'px';
      svg.style.height = height + 'px';
      svg.setAttribute('viewBox', [box.x - padding, box.y - padding, width, height].join(' '));
      svg.setAttribute('width', width);
      svg.setAttribute('height', height);
      document.body.style.width = width + 'px';
      document.body.style.minHeight = 'auto';
      return true;
    }

    let attempts = 0;
    const timer = setInterval(function () {
      attempts += 1;
      if (resizeForPrint() || attempts > 40) {
        clearInterval(timer);
      }
    }, 500);

    window.addEventListener('beforeprint', resizeForPrint);
  })();
</script>
